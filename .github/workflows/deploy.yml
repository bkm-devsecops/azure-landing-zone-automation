name: "Azure DevSecOps Terraform Deployment"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  devsecops_and_deploy:
    name: "Validate, Scan and Deploy"
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
    # 1. GitHub runner par code download karna
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. tfsec ko binary se direct root par scan karna (No Path Conflicts)
    - name: Install and Run tfsec
      run: |
        wget -q https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64
        chmod +x tfsec-linux-amd64
        ./tfsec-linux-amd64 .

  # 3. SonarQube Scanner Tool ko binary se direct root par run karna (No Secret Conflict)
    - name: Download and Run SonarScanner Directly
      run: |
        wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
        unzip -q sonar-scanner-cli-5.0.1.3006-linux.zip
        ./sonar-scanner-5.0.1.3006-linux/bin/sonar-scanner \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

    # 4. Terraform Setup
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.14.7

    # 5. Terraform Workflow Commands
    - name: Terraform Init
      run: terraform init

    - name: Terraform Format Check
      run: terraform fmt -check

    - name: Terraform Plan
      run: terraform plan -input=false

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve -input=false